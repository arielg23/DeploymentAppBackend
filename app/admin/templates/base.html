<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lock Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar .nav-link { color: #adb5bd; padding: .6rem 1.2rem; border-radius: 6px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #16213e; color: #fff; }
        .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: 700; padding: 1.2rem 1.2rem 0.5rem; }
        .status-badge { font-size: .75rem; }
        .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-auto col-md-2 p-0">
        <div class="brand"><i class="bi bi-lock-fill me-2"></i>Smart Lock</div>
        <p class="text-muted ps-3" style="font-size:.75rem">Admin Panel</p>
        <hr class="border-secondary mx-2">
        <ul class="nav flex-column">
            <li><a href="/admin/" class="nav-link {% if request.url.path == '/admin/' %}active{% endif %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><a href="/admin/uploads" class="nav-link {% if '/uploads' in request.url.path %}active{% endif %}"><i class="bi bi-cloud-upload me-2"></i>Uploads</a></li>
            <li><a href="/admin/sites" class="nav-link {% if '/sites' in request.url.path %}active{% endif %}"><i class="bi bi-building me-2"></i>Sites</a></li>
            <li><a href="/admin/technicians" class="nav-link {% if '/technicians' in request.url.path %}active{% endif %}"><i class="bi bi-people me-2"></i>Technicians</a></li>
            <li><a href="/admin/skip-reasons" class="nav-link {% if '/skip-reasons' in request.url.path %}active{% endif %}"><i class="bi bi-skip-forward me-2"></i>Skip Reasons</a></li>
        </ul>
        <hr class="border-secondary mx-2 mt-auto">
        <div class="px-3 pb-3">
            <small class="text-muted d-block">{{ admin.email }}</small>
            <a href="/admin/logout" class="btn btn-sm btn-outline-secondary mt-1 w-100">Logout</a>
        </div>
    </div>
    <main class="flex-grow-1 p-4">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
