{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Technicians</h4>
</div>
<div class="row g-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header fw-semibold">Add Technician</div>
            <div class="card-body">
                <form method="post" action="/admin/technicians/new">
                    <div class="mb-2"><input type="email" name="email" class="form-control form-control-sm" placeholder="Email" required></div>
                    <div class="mb-2"><input type="password" name="password" class="form-control form-control-sm" placeholder="Password" required minlength="8"></div>
                    <button type="submit" class="btn btn-sm btn-primary w-100">Create Technician</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Email</th><th>Status</th><th>Created</th><th></th></tr></thead>
                <tbody>
                {% for tech in technicians %}
                <tr>
                    <td>{{ tech.email }}</td>
                    <td><span class="badge bg-{% if tech.active %}success{% else %}secondary{% endif %}">{% if tech.active %}Active{% else %}Inactive{% endif %}</span></td>
                    <td>{{ tech.created_at.strftime('%Y-%m-%d') }}</td>
                    <td>
                        <form method="post" action="/admin/technicians/{{ tech.id }}/toggle" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-{% if tech.active %}outline-warning{% else %}outline-success{% endif %}">
                                {% if tech.active %}Deactivate{% else %}Activate{% endif %}
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center text-muted py-4">No technicians yet.</td></tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
