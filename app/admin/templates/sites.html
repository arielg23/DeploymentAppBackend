{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Sites</h4>
</div>
<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header fw-semibold">Add New Site</div>
            <div class="card-body">
                <form method="post" action="/admin/sites/new">
                    <div class="mb-2"><input type="text" name="site_id" class="form-control form-control-sm" placeholder="Site ID (e.g. SITE-001)" required></div>
                    <div class="mb-2"><input type="text" name="site_name" class="form-control form-control-sm" placeholder="Site Name" required></div>
                    <button type="submit" class="btn btn-sm btn-primary w-100">Add Site</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% for site in sites %}
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <strong>{{ site.site_name }}</strong>
        <small class="text-muted">{{ site.site_id }}</small>
    </div>
    <div class="card-body">
        <form method="post" action="/admin/sites/{{ site.site_id }}/access">
            <p class="text-muted small mb-2">Assign technicians who can access this site:</p>
            <div class="row g-2 mb-3">
            {% for tech in technicians %}
                <div class="col-auto">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="technician_ids" value="{{ tech.id }}"
                            {% if (tech.id, site.site_id) in access_set %}checked{% endif %}>
                        <label class="form-check-label">{{ tech.email }}</label>
                    </div>
                </div>
            {% endfor %}
            </div>
            <button type="submit" class="btn btn-sm btn-primary">Save Access</button>
        </form>
    </div>
</div>
{% else %}
<p class="text-muted">No sites configured yet.</p>
{% endfor %}
{% endblock %}
